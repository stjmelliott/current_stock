<!DOCTYPE html>
<html lang="en">
    <head>

        <link rel="stylesheet" href="https://maps-sdk.trimblemaps.com/v3/trimblemaps-3.21.0.css" />
        <script src="https://maps-sdk.trimblemaps.com/v3/trimblemaps-3.21.0.js"></script>
        <style>
            body { margin: 0; padding: 0; }

            #map {
                position: absolute;
                top: 0;

            }

    <body>
        <div id="map"></div>

        <script>
            // Add a route to map.
            TrimbleMaps.APIKey = '0B4D333647659245A7AD95A8576974C7';
            const map = new TrimbleMaps.Map({
                container: 'map',
                style: TrimbleMaps.Common.Style.TRANSPORTATION,
                center: new TrimbleMaps.LngLat(-74.566234, 40.49944),
                zoom: 8
            });
            
	        const myStops = [];

						myStops.push( response[0].Coords );
					},

					//	console.log("failure ",response);
					}
				});
					
			console.log("x: ", x);
			
			TrimbleMaps.Geocoder.geocode({

					console.log("myStops: ", myStops, myStops.length );

					//	console.log("failure ",response);
					}

	            console.log("myStops: ", myStops, myStops.length );
	            console.log(JSON.stringify(myStops, null, 2));

		            myStops2.push(myStops[c]);
	            }
	            console.log("myStops2: ", myStops2 );
	            
	            myStops3 = myStops;
	            console.log("myStops3: ", myStops3 );
	        */
	        
	        var otherStops = [
		        new TrimbleMaps.LngLat(-122.747666, 48.991487),

		    ];
	                        
	            console.log("otherStops: ", otherStops );

	        console.log("moreStops: ", moreStops );
	        */
	            
            const myRoute = new TrimbleMaps.Route({
                routeId: 'myRoute',

            map.on('load', function() {

</html>
